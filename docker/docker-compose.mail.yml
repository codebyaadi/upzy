services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: upzy-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    volumes:
      - mailpit-data:/data
    environment:
      MP_DATA_FILE: /data/mailpit.db

volumes:
  mailpit-data:
