services:
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: upzy-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redpanda-console:
    image: redpandadata/console:latest
    container_name: upzy-redpanda-console
    volumes:
      - ./redpanda-console-config.yml:/etc/console/config.yml
    entrypoint: /app/console
    command: --config.filepath=/etc/console/config.yml
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

volumes:
  redpanda_data:
    driver: local
